name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ rpm libgtest-dev

      - name: Configure
        run: cmake -S . -B build -DBUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Package
        working-directory: build
        run: |
          cpack -G DEB
          cpack -G RPM
          cpack -G TGZ
          cpack -G ZIP

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/*.deb
            build/*.rpm
            build/*.tar.gz
            build/*.zip
